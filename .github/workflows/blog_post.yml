name: US Market Blog — Auto Post (100% Free Stack)

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)  →  미국 증시 마감 리뷰
    - cron: "0 23 * * 0-4"   # 월~금 KST 오전 (일~목 UTC)

    # KST 22:00 = UTC 13:00         →  프리마켓 프리뷰
    - cron: "0 13 * * 0-4"   # 월~금 KST 저녁 (일~목 UTC)

  # 수동 실행 (테스트용)
  workflow_dispatch:
    inputs:
      post_type:
        description: "실행할 포스트"
        required: true
        default: "morning"
        type: choice
        options: [morning, evening, both]

jobs:
  # ─── 오전 포스트 (08:00 KST) ─────────────────────────────
  morning-post:
    name: "Morning — 증시 마감 리뷰"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["morning","both"]'), github.event.inputs.post_type))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 패키지 설치 (모두 무료)
        run: pip install -r requirements.txt

      - name: Morning Post 실행
        env:
          # ✅ 필요한 시크릿: 3개 (모두 무료 서비스)
          GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_SERVICE_ACCOUNT_JSON: ${{ secrets.BLOGGER_SERVICE_ACCOUNT_JSON }}
          BLOGGER_BLOG_ID:              ${{ secrets.BLOGGER_BLOG_ID }}
        run: python scripts/morning_post.py

      - name: 썸네일 업로드 (실패 시 디버그)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: morning-thumbnail-debug
          path: thumbnails/
          retention-days: 3

  # ─── 저녁 포스트 (22:00 KST) ─────────────────────────────
  evening-post:
    name: "Evening — 프리마켓 프리뷰"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["evening","both"]'), github.event.inputs.post_type))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 패키지 설치 (모두 무료)
        run: pip install -r requirements.txt

      - name: Evening Post 실행
        env:
          GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY }}
          BLOGGER_SERVICE_ACCOUNT_JSON: ${{ secrets.BLOGGER_SERVICE_ACCOUNT_JSON }}
          BLOGGER_BLOG_ID:              ${{ secrets.BLOGGER_BLOG_ID }}
        run: python scripts/evening_post.py

      - name: 썸네일 업로드 (실패 시 디버그)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evening-thumbnail-debug
          path: thumbnails/
          retention-days: 3
