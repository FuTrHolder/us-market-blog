name: "US Market Blog — Auto Post"

# ============================================================
# cron-job.org에서 POST body로 post_type을 전달합니다.
#
# [아침 Job 설정] KST 08:00 = UTC 23:00 (전날)
#   URL    : https://api.github.com/repos/[유저명]/[레포명]/actions/workflows/blog_post.yml/dispatches
#   Cron   : 0 23 * * 0,1,2,3,4
#   Method : POST
#   Headers:
#     Authorization: Bearer [GitHub PAT]
#     Accept: application/vnd.github+json
#     Content-Type: application/json
#   Body   : {"ref":"main","inputs":{"post_type":"morning"}}
#
# [오후 Job 설정] KST 16:30 = UTC 07:30  ← 홍콩/아시아 마감 리뷰
#   Cron   : 30 7 * * 1,2,3,4,5
#   Body   : {"ref":"main","inputs":{"post_type":"afternoon"}}
#
# [저녁 Job 설정] KST 22:30 = UTC 13:30
#   Cron   : 30 13 * * 1,2,3,4,5
#   Body   : {"ref":"main","inputs":{"post_type":"evening"}}
# ============================================================

on:
  workflow_dispatch:
    inputs:
      post_type:
        description: "실행할 포스트 (morning / afternoon / evening)"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - afternoon
          - evening

jobs:
  run-post:
    name: >
      ${{
        github.event.inputs.post_type == 'morning'   && 'Morning — 미국 증시 마감 리뷰'   ||
        github.event.inputs.post_type == 'afternoon' && 'Afternoon — 홍콩/아시아 마감 리뷰' ||
        'Evening — 프리마켓 프리뷰'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 포스트 실행 (post_type에 따라 자동 분기)
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          POST_TYPE:             ${{ github.event.inputs.post_type }}
        run: |
          if [ "$POST_TYPE" = "morning" ]; then
            echo "▶ 아침 포스팅 실행 (미국 증시 마감 리뷰)"
            python -m scripts.morning_post
          elif [ "$POST_TYPE" = "afternoon" ]; then
            echo "▶ 오후 포스팅 실행 (홍콩/아시아 마감 리뷰)"
            python -m scripts.afternoon_post
          else
            echo "▶ 저녁 포스팅 실행 (프리마켓 프리뷰)"
            python -m scripts.evening_post
          fi

      - name: 실패 시 썸네일 업로드 (디버그용)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.event.inputs.post_type }}-${{ github.run_id }}
          path: thumbnails/
          retention-days: 3
