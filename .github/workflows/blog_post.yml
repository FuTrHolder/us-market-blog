name: US Market Blog — Auto Post (100% Free Stack)

on:
  schedule:
    # KST 08:00 = UTC 23:00 (전날)  →  미국 증시 마감 리뷰
    - cron: "0 23 * * 0-4"

    # KST 22:00 = UTC 13:00         →  프리마켓 프리뷰
    - cron: "0 13 * * 0-4"

  workflow_dispatch:
    inputs:
      post_type:
        description: "실행할 포스트"
        required: true
        default: "morning"
        type: choice
        options: [morning, evening, both]

jobs:
  morning-post:
    name: "Morning — 증시 마감 리뷰"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["morning","both"]'), github.event.inputs.post_type))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Morning Post 실행
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
        # ✅ 수정 1: 레포 루트에서 실행해야 utils 패키지를 찾을 수 있음
        # scripts/ 폴더 안에서 실행하면 utils를 못 찾는 문제 발생
        run: python -m scripts.morning_post

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: morning-debug
          path: thumbnails/
          retention-days: 3

  evening-post:
    name: "Evening — 프리마켓 프리뷰"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && contains(fromJson('["evening","both"]'), github.event.inputs.post_type))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Evening Post 실행
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
        run: python -m scripts.evening_post

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evening-debug
          path: thumbnails/
          retention-days: 3
