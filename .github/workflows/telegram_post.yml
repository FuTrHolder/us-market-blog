name: "Telegram → Blog Auto Post"

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: "처리할 기사 URL"
        required: true
        type: string
      chat_id:
        description: "텔레그램 chat_id"
        required: true
        type: string
      message_id:
        required: false
        type: string
        default: ""
      extra_comment:
        required: false
        type: string
        default: ""

jobs:
  process-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 팩트체크
        id: fact_check
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:        ${{ github.event.inputs.article_url }}
          CHAT_ID:            ${{ github.event.inputs.chat_id }}
          EXTRA_COMMENT:      ${{ github.event.inputs.extra_comment }}
        run: |
          python -m scripts.telegram_post \
            --mode fact_check \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID" \
            --comment "$EXTRA_COMMENT"

      - name: 블로그 게시
        if: steps.fact_check.outcome == 'success'
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:           ${{ github.event.inputs.article_url }}
          CHAT_ID:               ${{ github.event.inputs.chat_id }}
        run: |
          python -m scripts.telegram_post \
            --mode publish \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID"

      - name: 실패 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ github.event.inputs.chat_id }}
        run: |
          python -c "
          import os, requests
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={'chat_id': chat_id, 'text': '⚠️ An error occurred. Please try again.', 'parse_mode': 'HTML'}
          )
          "
