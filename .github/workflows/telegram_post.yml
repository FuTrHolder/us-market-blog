name: "Telegram → Blog Auto Post"

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: "처리할 기사 URL"
        required: true
        type: string
      chat_id:
        description: "텔레그램 chat_id"
        required: true
        type: string
      message_id:
        required: false
        type: string
        default: ""
      extra_comment:
        required: false
        type: string
        default: ""

jobs:
  process-and-post:
    name: "팩트체크 → 분석 → 블로그 게시"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 팩트체크 ──────────────────────────────────────────
      # Publishing cancelled / 기사 로드 실패 시에도 exit(0) 으로 정상 종료
      # → workflow 자체는 성공 처리 → GitHub 실패 알림 메일 발송 안 됨
      - name: 팩트체크
        id: fact_check
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:        ${{ github.event.inputs.article_url }}
          CHAT_ID:            ${{ github.event.inputs.chat_id }}
          EXTRA_COMMENT:      ${{ github.event.inputs.extra_comment }}
        run: |
          python -m scripts.telegram_post \
            --mode fact_check \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID" \
            --comment "$EXTRA_COMMENT"

      # ── proceed 플래그 확인 ───────────────────────────────
      # fact_check_result.json 의 proceed 값이 true 일 때만 게시 진행
      - name: 게시 여부 확인
        id: check_proceed
        run: |
          if [ -f fact_check_result.json ]; then
            PROCEED=$(python -c "import json; d=json.load(open('fact_check_result.json')); print(str(d.get('proceed', False)).lower())")
          else
            PROCEED="false"
          fi
          echo "proceed=$PROCEED" >> $GITHUB_OUTPUT
          echo "proceed=$PROCEED"

      # ── 블로그 게시 ───────────────────────────────────────
      # proceed=true 일 때만 실행, false 면 스킵 (정상 종료 유지)
      - name: 블로그 게시
        if: steps.check_proceed.outputs.proceed == 'true'
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:           ${{ github.event.inputs.article_url }}
          CHAT_ID:               ${{ github.event.inputs.chat_id }}
        run: |
          python -m scripts.telegram_post \
            --mode publish \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID"

      # ── 실제 오류(예외) 발생 시에만 알림 ────────────────
      # steps.fact_check 또는 steps.블로그게시 가 실제 예외로 실패한 경우
      - name: 오류 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ github.event.inputs.chat_id }}
        run: |
          python -c "
          import os, requests
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={
              'chat_id':    chat_id,
              'text':       '⚠️ An unexpected error occurred. Please check GitHub Actions logs.',
              'parse_mode': 'HTML'
            }
          )
          "
