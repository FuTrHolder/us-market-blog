name: "Telegram → Blog Auto Post"

# ============================================================
# Cloudflare Worker가 POST body로 아래 inputs을 전달합니다.
# ============================================================

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: "처리할 기사 URL"
        required: true
        type: string
      chat_id:
        description: "텔레그램 chat_id (진행상황 전송)"
        required: true
        type: string
      message_id:
        description: "원본 메시지 ID"
        required: false
        type: string
        default: ""
      extra_comment:
        description: "사용자 추가 코멘트"
        required: false
        type: string
        default: ""

jobs:
  process-and-post:
    name: "팩트체크 → 분석 → 블로그 게시"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "[1/4] 팩트체크 시작 알림"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ github.event.inputs.chat_id }}
        run: |
          python -c "
          import os, requests
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          url_val = '${{ github.event.inputs.article_url }}'
          msg = (
            '📰 <b>[1/4] 기사 분석 시작</b>\n\n'
            f'🔗 URL: {url_val[:80]}...\n\n'
            '⏳ 기사 내용을 읽고 팩트 검증 중...'
          )
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={'chat_id': chat_id, 'text': msg, 'parse_mode': 'HTML'}
          )
          "

      - name: "[2/4] 팩트체크 & 심층분석 실행"
        id: fact_check
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:        ${{ github.event.inputs.article_url }}
          CHAT_ID:            ${{ github.event.inputs.chat_id }}
          EXTRA_COMMENT:      ${{ github.event.inputs.extra_comment }}
        run: |
          python -m scripts.telegram_post \
            --mode fact_check \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID" \
            --comment "$EXTRA_COMMENT"

      - name: "[3/4] 블로그 게시 알림"
        if: steps.fact_check.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ github.event.inputs.chat_id }}
        run: |
          python -c "
          import os, requests
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={
              'chat_id':    chat_id,
              'text':       '🖼️ <b>[3/4] 썸네일 생성 & 블로그 게시 중...</b>',
              'parse_mode': 'HTML'
            }
          )
          "

      - name: "[4/4] 블로그 게시 실행"
        id: publish
        if: steps.fact_check.outcome == 'success'
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID:       ${{ secrets.BLOGGER_BLOG_ID }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ARTICLE_URL:           ${{ github.event.inputs.article_url }}
          CHAT_ID:               ${{ github.event.inputs.chat_id }}
        run: |
          python -m scripts.telegram_post \
            --mode publish \
            --url  "$ARTICLE_URL" \
            --chat "$CHAT_ID"

      - name: "팩트체크 실패 알림"
        if: steps.fact_check.outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ github.event.inputs.chat_id }}
        run: |
          python -c "
          import os, requests
          token   = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          requests.post(
            f'https://api.telegram.org/bot{token}/sendMessage',
            json={
              'chat_id':    chat_id,
              'text':       '⚠️ <b>팩트체크 또는 분석 중 오류가 발생했습니다.</b>\n\nURL을 다시 확인하고 재시도해주세요.',
              'parse_mode': 'HTML'
            }
          )
          "

      - name: "전체 실패 시 디버그 아티팩트 업로드"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-telegram-${{ github.run_id }}
          path: |
            thumbnails/
            fact_check_result.json
          retention-days: 3
          if-no-files-found: ignore
